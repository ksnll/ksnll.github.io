# The URL the site will be built for
base_url = "https://ksnll.com"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = false

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

[markdown]

[markdown.highlighting]
# Zola 0.22 uses Giallo for syntax highlighting. Keep the existing Enki Tokyo
# Night colors by loading the theme as a JSON TextMate theme.
theme = "Enki-Tokyo-Night"
style = "inline"
extra_themes = ["highlight_theme/Enki-Tokyo-Night.json"]

[extra]
# Put all your custom variables here
